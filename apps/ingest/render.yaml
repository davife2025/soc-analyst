services:
  - type: web
    name: soc-ingest
    env: node
    region: oregon
    plan: starter
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @soc/ingest build
    startCommand: node apps/ingest/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SPLUNK_TOKEN
        sync: false
