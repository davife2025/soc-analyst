services:
  - type: worker
    name: soc-agent
    env: node
    region: oregon
    plan: starter
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @soc/agent build
    startCommand: node apps/agent/dist/index.js
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: KIMI_MODEL
        value: moonshotai/Kimi-K2-Instruct
      - key: SPLUNK_HOST
        sync: false
      - key: SPLUNK_PORT
        value: "8089"
      - key: SPLUNK_TOKEN
        sync: false
      - key: POLL_INTERVAL_MS
        value: "30000"
      - key: PORT
        value: "10000"
